name: Security Scan

on:
  schedule:
    - cron: "0 9 * * 1"
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        # P99 S1.8 T01 triage 2026-05-04: pass --config explicitly so the
        # repo-root .gitleaks.toml allowlist (env-template placeholders) loads.
        # Without --config gitleaks auto-detect can be path-sensitive in CI.
        run: gitleaks detect --source=. --config=.gitleaks.toml --log-level=warn --redact
