name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  cli-check:
    name: nself CLI Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install nself CLI
        env:
          # Pin to last release that has linux/amd64 binary; remove pin when cli v1.1.3 binaries ship.
          # v1.1.3 release tag exists but has no linux/amd64 asset (incomplete release build).
          NSELF_VERSION: "1.1.2"
        run: |
          curl -fsSL https://raw.githubusercontent.com/nself-org/cli/main/.github/install.sh | bash
          echo "$HOME/.nself/bin" >> $GITHUB_PATH

      - name: Verify nself CLI
        run: |
          nself version
          nself help

  clean-root:
    name: Clean Root Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forbid markdown at repo root other than README.md
        run: |
          OFFENDERS=$(find . -maxdepth 1 -name '*.md' ! -name 'README.md' -type f | sort)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Disallowed markdown files at repo root: $OFFENDERS"
            exit 1
          fi
          echo "Repo root markdown is clean."

      - name: Forbid tracked OS junk / secret .env files
        run: |
          JUNK=$(git ls-files | grep -E '(^|/)(\.DS_Store|Thumbs\.db|desktop\.ini)$|\.swp$|\.swo$' || true)
          if [ -n "$JUNK" ]; then echo "::error::Tracked OS junk: $JUNK"; exit 1; fi
          ENV=$(git ls-files | grep -E '(^|/)(\.env|\.env\.local|\.env\.secrets|\.env\.computed)$' \
            | grep -vE '(^|/)(\.environments|environments)/[^/]+/\.env$' || true)
          if [ -n "$ENV" ]; then echo "::error::Tracked secret-bearing .env: $ENV"; exit 1; fi
          echo "Working tree clean."
