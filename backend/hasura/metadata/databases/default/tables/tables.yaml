# ---------------------------------------------------------------------------
# app_lists table
# ---------------------------------------------------------------------------
- table:
    schema: public
    name: app_lists
  object_relationships:
    - name: owner
      using:
        foreign_key_constraint_on: user_id
  array_relationships:
    - name: todos
      using:
        foreign_key_constraint_on:
          column: list_id
          table:
            schema: public
            name: app_todos
    - name: shares
      using:
        foreign_key_constraint_on:
          column: list_id
          table:
            schema: public
            name: app_list_shares
    - name: members
      using:
        foreign_key_constraint_on:
          column: list_id
          table:
            schema: public
            name: app_list_members
    - name: presence
      using:
        foreign_key_constraint_on:
          column: list_id
          table:
            schema: public
            name: app_list_presence
  insert_permissions:
    - role: user
      permission:
        columns:
          - title
          - description
          - color
          - icon
          - position
        check:
          user_id:
            _eq: X-Hasura-User-Id
        set:
          user_id: X-Hasura-User-Id
  select_permissions:
    - role: user
      permission:
        columns:
          - id
          - user_id
          - title
          - description
          - color
          - icon
          - is_default
          - position
          - created_at
          - updated_at
        filter:
          _or:
            - user_id:
                _eq: X-Hasura-User-Id
            - shares:
                shared_with_user_id:
                  _eq: X-Hasura-User-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - title
          - description
          - color
          - icon
          - position
        filter:
          user_id:
            _eq: X-Hasura-User-Id
        check: null
  delete_permissions:
    - role: user
      permission:
        filter:
          user_id:
            _eq: X-Hasura-User-Id

# ---------------------------------------------------------------------------
# app_list_shares table
# ---------------------------------------------------------------------------
- table:
    schema: public
    name: app_list_shares
  object_relationships:
    - name: list
      using:
        foreign_key_constraint_on: list_id
  insert_permissions:
    - role: user
      permission:
        columns:
          - list_id
          - shared_with_email
          - permission
        check:
          list:
            user_id:
              _eq: X-Hasura-User-Id
        set:
          invited_by: X-Hasura-User-Id
  select_permissions:
    - role: user
      permission:
        columns:
          - id
          - list_id
          - shared_with_user_id
          - shared_with_email
          - permission
          - invited_by
          - accepted_at
          - created_at
          - updated_at
        filter:
          _or:
            - invited_by:
                _eq: X-Hasura-User-Id
            - shared_with_user_id:
                _eq: X-Hasura-User-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - permission
        filter:
          list:
            user_id:
              _eq: X-Hasura-User-Id
        check: null
  delete_permissions:
    - role: user
      permission:
        filter:
          _or:
            - invited_by:
                _eq: X-Hasura-User-Id
            - shared_with_user_id:
                _eq: X-Hasura-User-Id

# ---------------------------------------------------------------------------
# app_list_presence table (real-time presence tracking)
# ---------------------------------------------------------------------------
- table:
    schema: public
    name: app_list_presence
  object_relationships:
    - name: list
      using:
        foreign_key_constraint_on: list_id
    - name: user
      using:
        foreign_key_constraint_on: user_id
  insert_permissions:
    - role: user
      permission:
        columns:
          - list_id
          - status
          - editing_todo_id
        check: {}
        set:
          user_id: X-Hasura-User-Id
  select_permissions:
    - role: user
      permission:
        columns:
          - id
          - list_id
          - user_id
          - status
          - editing_todo_id
          - last_seen_at
          - created_at
        filter:
          list:
            _or:
              - user_id:
                  _eq: X-Hasura-User-Id
              - shares:
                  shared_with_user_id:
                    _eq: X-Hasura-User-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - status
          - editing_todo_id
          - last_seen_at
        filter:
          user_id:
            _eq: X-Hasura-User-Id
        check: null
  delete_permissions:
    - role: user
      permission:
        filter:
          user_id:
            _eq: X-Hasura-User-Id

# ---------------------------------------------------------------------------
# app_list_members table
# ---------------------------------------------------------------------------
- table:
    schema: public
    name: app_list_members
  object_relationships:
    - name: list
      using:
        foreign_key_constraint_on: list_id
    - name: user
      using:
        foreign_key_constraint_on: user_id
  insert_permissions:
    - role: user
      permission:
        columns:
          - list_id
          - user_id
          - role
        check:
          list:
            user_id:
              _eq: X-Hasura-User-Id
        set:
          added_by: X-Hasura-User-Id
  select_permissions:
    - role: user
      permission:
        columns:
          - id
          - list_id
          - user_id
          - role
          - added_by
          - added_at
          - created_at
          - updated_at
        filter:
          _or:
            - user_id:
                _eq: X-Hasura-User-Id
            - list:
                user_id:
                  _eq: X-Hasura-User-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - role
        filter:
          list:
            user_id:
              _eq: X-Hasura-User-Id
        check: null
  delete_permissions:
    - role: user
      permission:
        filter:
          list:
            user_id:
              _eq: X-Hasura-User-Id
