# Generated by nself build - DO NOT EDIT MANUALLY
# Service: docs.localhost

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name docs.localhost;

    ssl_certificate /etc/nginx/ssl/certificates/localhost/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/certificates/localhost/privkey.pem;

    server_tokens off;

    location /api-docs {
        alias /opt/nself/.dist/openapi.json;
        add_header Content-Type "application/json";
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-store";
    }
    location /docs {
        alias /opt/nself/.dist/scalar.html;
        add_header Content-Type "text/html";
        add_header Cache-Control "no-store";
    }
}
