# nClaw Web UI & API - claw.camarata.com
# Handles both marketing site (Next.js) and AI API (plugin-claw)

# 1. Marketing / UI
server {
    listen 8443 ssl;
    http2 on;
    server_name claw.camarata.com;

    ssl_certificate /etc/nginx/ssl/nself-org/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/nself-org/privkey.pem;

    location /claw/telegram/ {
        proxy_pass http://plugin-claw:3710/claw/telegram/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Proxy to Next.js app running on host or another container
        proxy_pass http://host.docker.internal:3016;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security: block access to logs and sensitive files
    location ~* \.(log|sql|bak|conf|ini|sh|env)$ {
        return 404;
    }
}

# 2. AI API
server {
    listen 8443 ssl;
    http2 on;
    server_name api.claw.camarata.com;

    ssl_certificate /etc/nginx/ssl/nself-org/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/nself-org/privkey.pem;

    location / {
        proxy_pass http://plugin-claw:3710;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering so AI chunks stream immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Security: block access to logs and sensitive files
    location ~* \.(log|sql|bak|conf|ini|sh|env)$ {
        return 404;
    }
}
