# nSelf Mux - ali.camarata.com
# Handles incoming webhooks, specifically Google Pub/Sub for Gmail Push
server {
    listen 8443 ssl;
    http2 on;
    server_name ali.camarata.com alipmux.camarata.com;

    ssl_certificate /etc/nginx/ssl/nself-org/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/nself-org/privkey.pem;

    # Include common SSL settings
    include /etc/nginx/includes/ssl.conf;

    location /mux/ {
        proxy_pass http://mux:3711;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webhook processing might be slow, but Pub/Sub needs 200 fast.
        # Mux handles immediate ACK internally, but we set a safe timeout.
        proxy_read_timeout 60s;
    }

    # Redirect root to dashboard (optional)
    location / {
        return 301 https://dashboard.camarata.com;
    }
}
