# Generated by nself build - DO NOT EDIT MANUALLY
# Service: api.localhost

server {
    listen 80;
    listen [::]:80;
    server_name api.localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'" always;
    server_tokens off;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Block access to sensitive files and directories
    location ~ /\.(env|git|svn|htaccess|htpasswd|dockerignore) {
        return 404;
    }
    location ~ ^/(docker-compose|Dockerfile) {
        return 404;
    }

    location / {
        limit_req zone=graphql_api burst=20 nodelay;
        limit_conn conn_limit_per_ip 10;
        resolver 127.0.0.11 valid=10s;
        set $upstream http://hasura:8080;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass_request_headers on;
        proxy_read_timeout 86400;
    }
}
